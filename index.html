<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ff9eb5, #ffe6eb);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

.container {
  text-align: center;
}

h1 {
  font-size: 40px;
  color: white;
  animation: heartbeat 1s infinite;
}

p {
  font-size: 20px;
  color: white;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  margin-top: 20px;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.1); }
  50% { transform: scale(1); }
  75% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Floating hearts */
.heart {
  position: absolute;
  color: white;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>

<body>

<div class="container">
  <h1 id="text"></h1>
  <p>Forever & Always 💞</p>
  <button onclick="surprise()">Click for Surprise 😍</button>
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
// Typing effect
let message = "I love you Vanshika ❤️";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  }
}
typeWriter();

// Surprise → YOUR IMAGE
function surprise() {
  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:#ffe6eb;
    ">
      <img src="hug.jpg" style="width:260px; border-radius:20px;">
      <h2 style="color:#ff4d88; font-family:Arial;">
        A hug just for you 🤗❤️
      </h2>
    </div>
  `;
}

// Floating hearts
function createHeart() {
  let heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
